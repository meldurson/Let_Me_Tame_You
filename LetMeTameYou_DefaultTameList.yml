#### Instructions #####
#To specify a creature to be tamed you add their prefab name on a new line followed by a colon:
#   All the specific attribute lines after that pertaining to that creature need to be indented.
#   The different options for attributes are as follows:

### tamingTime:###
#     time in seconds for a creature to be tamed (vanilla is 1800 which is 30 minutes)
#  tamingTime: 1800

### fedDuration:###
#     time after eating before gets hungry again (default is 600 seconds)
#  fedDuration: 600

### commandable:###
#     can you interact with them to ask them to follow/stay (default is Boar/Lox/Hen/Asksvin=false, Wolf=true)
#  commandable: true

### requiredWorldKeys:###
#     required world keys needed before being able to tame, most likely bosses killed (default is none)
#	  Do you want to require a boss or creature to be killed before you are able to tame this creature? Any world key can be specified (be careful though, if you misspell it, you will not be able to tame this creature).
#	  You can separate multiple keys with a comma , as shown below.
#	  If you do not have the required keys, when hovering over the creature it will say "Feral" instead of "Wild"
#	  Below is an example that requires you to defeat both Eikthyr and Modor to be able to tame.
#  requiredWorldKeys: defeated_dragon,defeated_eikthyr

### consumeItems:###
#     This is where you put the ID's of the items you want the creature to eat, put a comma , symbol in between each food (doesn't need to be a food item)
#  consumeItems: SerpentMeat,RawMeat,NeckTail,FishRaw,LoxMeat,DeerMeat,WolfMeat,HareMeat

### consumeSearchRange:###
#     This is the range the creature can detect food from (default is 15)
#  consumeSearchRange: 15

### consumeSearchInterval:###
#      This is how often the creature checks to see if food is in range to decides whether it needs it (in seconds) deault is 10
#  consumeSearchInterval: 10
### consumeRange:###
#     This is the max range the creature can be at to eat food
#  consumeRange: 1.5

### procreation:###
#     Whether you want your creature to be able to procreate (default is true)
#  procreation: true
### offspringOverwrite:###


### pregnancyChance:###
#     This is the chance the creature has of becoming pregnant, Lower number = higher chance (scales from 0.00 to 1.00)
#     vanilla is 0.66 which is a 33% chance to gain a love point every 20 seconds (at 4 love points a creature becomes pregnant)
#  pregnancyChance: 0.66

### pregnancyDuration:###
#     This is how long the creature is pregnant for in seconds (vanilla is Boar/Wolf/Hen=60, Lox=120 )
#  pregnancyDuration: 120

### maxCreatures:###
#     This is the max number of creatures within range that can breed with or are offspring, if it exceeds this, they will stop breeding
#     vanilla is Boar=5, Wolf/Lox=4, Hen=10
#  maxCreatures: 5

### size:###
#     multiplier to determine how far away it checks for other creatures.
#     Lox should be at least 2, Vanilla Bosses should be 3, 4 is only if it is massive!
#     You can use decimals and specify a smaller range if you choose such as 0.5 for a small creature such as a hen.
#  size: 1.5

### growTime:###
#     This is how long it takes for offspring to grow into an adult (in seconds)
#     vanilla is Boar/Wolf=3000, Lox=6000, Hen=1800 for Egg Hatch + 3000 for Chick to grow up (seconds)
#  growTime: 3000


### offspringName:###
#     custom name for offspring if you do not want "Mini Creature Name"
#     can specify spaces using an underscore
#  offspringName: Ulv_Pup


### egg:###
#     Have the creature lay an egg that will hatch into a mini version.
#     Choose which egg to copy, how long it will take to hatch when near a fire, if you want to change the color, if you want to change the size.
#     by default, you do not need to specify anything other than the egg type such as egg=drake or egg=chicken
#     the color is specified as a hex code such as #FFFFFF for white or #FF0000 for red.
#     an example would be the following which would have necks lay a smaller version of the dragon egg with a color of green and a hatch time of 20 minutes.
#  egg: drake(1200:#00FF00:0.3)


### trade:### (currently WIP)
#   if you want to trade (use item) with a creature to tame it instead of throwing food on the ground
#   To make a creature tameable by trading format trades as Tradeitem=TradeAmount and separate items with a colon :
#  trade: TrophyKvastur=10:YggdrasilWood=100

### hostileToSelf:###
#     This is whether the creature will change faction when tamed (If set to true it will attack/get attacked by anything that attacks you)
#     This includes the same creature, for example a tamed goblin and wild goblin with attack each other
#  hostileToSelf: true

### followDistMulti:###
#     if a creature follows too closely you can multiply how far away they will follow at
#  followDistMulti: 2

### removeTameable:###
#     This is used if you want to remove the ability to tame a creature that is already tameable (default is false)
#  removeTameable: true

### specialGroup:###
#     specialGroup are used to determine if mobs will be hostile towards each other, if two mobs have the same group then if one is tamed and the other wild they will still not attack each other.
#     specialGroup can equal whatever name you want for example, if you add specialGroup: AllGoblin to all of the goblins they will not attack each other if one is tamed and the other is wild.
#  specialGroup: AllGoblin

### groups:###
# these are a way to combine attributes for organizing and ease of changing multiple creatures at once
# They are formatted the same as a standard creature except the name starts with "group_"





##Vanilla Values##
#	commandable:		Boar/Lox/Hen/Asksvin=false, Wolf=true
#	taming time:		1800 (seconds)
#	fed duration:		600 (seconds)
#	consume range:		Boar/Hen=1, Wolf=1.4, Lox=4 (units distance)
#	consumeSearchInterval:	10 (seconds)
#	consumeSearchRange:	10 (units distance)
#	consumeItems:		many foods
#	hostileToSelf:		false
#	procretion:			true
#	maxCreatures:		Boar=5, Wolf/Lox=4, Hen/Asksvin=10 (max creatures in area before unable to procreate)
#	pregnancyChance:	0.33 (Lower is better, out of 1, this is 66% chance)
#	pregnancyDuration:	Boar/Wolf/Hen=60, Asksvin=90, Lox=120 (seconds)
#	growTime:			Boar/Wolf=3000, Lox=6000, Hen/Asksvin=1800 for Egg Hatch + 3000 for baby to grow up (seconds)






###Groups
#   groups can be used to join specific values together to easily modify groups of creatures
#   groups are specified the same way as a standard creature with just a prefix on the name "group_"
#   such as

group_Default:
  fedDuration: 300
  commandable: true
  consumeSearchInterval: 10
  pregnancyChance: 0.5

#The default group above overwrites the base for all configs, it does not need to be referenced below. It is automatically applied to all future configs.
